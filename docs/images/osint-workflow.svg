<svg xmlns="http://www.w3.org/2000/svg"
     width="1280"
     height="420"
     viewBox="0 0 1280 420"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Bee OSINT Workflow</title>

  <desc id="desc">
    Workflow diagram for OSINT collection, extraction, analysis, and dashboard operations.
  </desc>

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="12"
        flood-color="#102a4c"
        flood-opacity="0.08"/>
    </filter>

    <marker id="arrow"
            viewBox="0 0 10 10"
            refX="9"
            refY="5"
            markerWidth="8"
            markerHeight="8"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4f82"/>
    </marker>

    <style>
      .title {
        font: 700 34px Arial, sans-serif;
        fill: #102a4c;
      }

      .subtitle {
        font: 400 18px Arial, sans-serif;
        fill: #62748d;
      }

      .card {
        fill: #ffffff;
        stroke: #d8e4f2;
        stroke-width: 2;
        filter: url(#shadow);
      }

      .num {
        fill: #39bf7f;
      }

      .numText {
        font: 700 16px Arial, sans-serif;
        fill: #ffffff;
      }

      .cardTitle {
        font: 700 20px Arial, sans-serif;
        fill: #17365d;
      }

      .cardText {
        font: 400 15px Arial, sans-serif;
        fill: #62748d;
      }

      .line {
        stroke: #1f4f82;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>

  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>

  <text x="70" y="60" class="title">
    OSINT Data Workflow
  </text>

  <text x="70" y="92" class="subtitle">
    From source registration to dashboard intelligence and sentiment reporting.
  </text>

  <g transform="translate(50 160)">
    <rect width="190" height="105" rx="18" class="card"/>

    <circle cx="28" cy="24" r="14" class="num"/>
    <text x="23" y="29" class="numText">1</text>

    <text x="50" y="30" class="cardTitle">Sources</text>

    <text x="28" y="66" class="cardText">
      Register RSS feeds,
    </text>

    <text x="28" y="90" class="cardText">
      news portals, publishers.
    </text>
  </g>

  <g transform="translate(290 160)">
    <rect width="190" height="105" rx="18" class="card"/>

    <circle cx="28" cy="24" r="14" class="num"/>
    <text x="23" y="29" class="numText">2</text>

    <text x="50" y="30" class="cardTitle">Run</text>

    <text x="28" y="66" class="cardText">
      Manual or scheduled
    </text>

    <text x="28" y="90" class="cardText">
      collection starts tasks.
    </text>
  </g>

  <g transform="translate(530 160)">
    <rect width="190" height="105" rx="18" class="card"/>

    <circle cx="28" cy="24" r="14" class="num"/>
    <text x="23" y="29" class="numText">3</text>

    <text x="50" y="30" class="cardTitle">Extract</text>

    <text x="28" y="66" class="cardText">
      Fetch articles and parse
    </text>

    <text x="28" y="90" class="cardText">
      metadata and sources.
    </text>
  </g>

  <g transform="translate(770 160)">
    <rect width="190" height="105" rx="18" class="card"/>

    <circle cx="28" cy="24" r="14" class="num"/>
    <text x="23" y="29" class="numText">4</text>

    <text x="50" y="30" class="cardTitle">Analyze</text>

    <text x="28" y="66" class="cardText">
      Detect entities, trends,
    </text>

    <text x="28" y="90" class="cardText">
      and sentiment signals.
    </text>
  </g>

  <g transform="translate(1010 160)">
    <rect width="190" height="105" rx="18" class="card"/>

    <circle cx="28" cy="24" r="14" class="num"/>
    <text x="23" y="29" class="numText">5</text>

    <text x="50" y="30" class="cardTitle">Operate</text>

    <text x="28" y="66" class="cardText">
      Review dashboards,
    </text>

    <text x="28" y="90" class="cardText">
      records, and graphs.
    </text>
  </g>

  <path d="M 240 212 H 290" class="line"/>
  <path d="M 480 212 H 530" class="line"/>
  <path d="M 720 212 H 770" class="line"/>
  <path d="M 960 212 H 1010" class="line"/>

</svg>