<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Bee application modules</title>
  <desc id="desc">Module map for the Bee OSINT platform showing dashboard, news, sources, word list, sentiment, records, graphs, and notifications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#102a4c" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #102a4c; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #62748d; }
      .hub { fill: #203958; rx: 28; filter: url(#shadow); }
      .hubText { font: 700 30px Arial, sans-serif; fill: #ffffff; }
      .hubSmall { font: 400 17px Arial, sans-serif; fill: #c9d8e7; }
      .card { fill: #ffffff; stroke: #d7e3f1; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .cardTitle { font: 700 21px Arial, sans-serif; fill: #102a4c; }
      .cardText { font: 400 15px Arial, sans-serif; fill: #62748d; }
      .accent { fill: #36bd7d; rx: 10; }
      .line { stroke: #aab8ca; stroke-width: 2.5; fill: none; }
    </style>
  </defs>
  <rect width="1280" height="620" fill="url(#bg)"/>
  <text x="52" y="58" class="title">Application Modules</text>
  <text x="52" y="90" class="subtitle">The frontend exposes operational OSINT workflows backed by the FastAPI service.</text>

  <rect x="490" y="238" width="300" height="138" class="hub"/>
  <text x="560" y="296" class="hubText">Bee OSINT</text>
  <text x="538" y="332" class="hubSmall">Monitoring and analysis workspace</text>

  <path d="M 490 275 L 294 172" class="line"/>
  <path d="M 640 238 L 640 154" class="line"/>
  <path d="M 790 275 L 986 172" class="line"/>
  <path d="M 490 344 L 294 448" class="line"/>
  <path d="M 640 376 L 640 466" class="line"/>
  <path d="M 790 344 L 986 448" class="line"/>

  <rect x="66" y="120" width="300" height="130" class="card"/>
  <rect x="90" y="144" width="14" height="82" class="accent"/>
  <text x="122" y="158" class="cardTitle">Dashboard</text>
  <text x="122" y="190" class="cardText">Totals, OSINT activity, trends,</text>
  <text x="122" y="214" class="cardText">sources, places, and sentiment.</text>

  <rect x="490" y="98" width="300" height="130" class="card"/>
  <rect x="514" y="122" width="14" height="82" class="accent"/>
  <text x="546" y="136" class="cardTitle">News</text>
  <text x="546" y="168" class="cardText">Recent captured articles with</text>
  <text x="546" y="192" class="cardText">entities, sentiment, and source links.</text>

  <rect x="914" y="120" width="300" height="130" class="card"/>
  <rect x="938" y="144" width="14" height="82" class="accent"/>
  <text x="970" y="158" class="cardTitle">OSINT Sources</text>
  <text x="970" y="190" class="cardText">Source registry used by collection,</text>
  <text x="970" y="214" class="cardText">including inactive sources in analytics.</text>

  <rect x="66" y="394" width="300" height="130" class="card"/>
  <rect x="90" y="418" width="14" height="82" class="accent"/>
  <text x="122" y="432" class="cardTitle">Word List</text>
  <text x="122" y="464" class="cardText">Topic monitors with dynamic keywords</text>
  <text x="122" y="488" class="cardText">and manual play processing.</text>

  <rect x="490" y="456" width="300" height="130" class="card"/>
  <rect x="514" y="480" width="14" height="82" class="accent"/>
  <text x="546" y="494" class="cardTitle">Records and Notes</text>
  <text x="546" y="526" class="cardText">Case documentation, notes,</text>
  <text x="546" y="550" class="cardText">files, and operational context.</text>

  <rect x="914" y="394" width="300" height="130" class="card"/>
  <rect x="938" y="418" width="14" height="82" class="accent"/>
  <text x="970" y="432" class="cardTitle">Graphs</text>
  <text x="970" y="464" class="cardText">Relationship analysis for entities,</text>
  <text x="970" y="488" class="cardText">connections, and records.</text>
</svg>
