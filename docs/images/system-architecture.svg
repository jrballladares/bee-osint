<svg xmlns="http://www.w3.org/2000/svg"
     width="1280"
     height="640"
     viewBox="0 0 1280 640"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Bee OSINT Intelligence Platform</title>
  <desc id="desc">Clean architecture diagram for Bee OSINT platform.</desc>

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f3"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="8"
        stdDeviation="12"
        flood-color="#15304f"
        flood-opacity="0.10"/>
    </filter>

    <marker id="arrow"
            viewBox="0 0 10 10"
            refX="9"
            refY="5"
            markerWidth="8"
            markerHeight="8"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6690"/>
    </marker>

    <style>
      .title {
        font: 700 36px Arial, sans-serif;
        fill: #102a43;
      }

      .subtitle {
        font: 400 18px Arial, sans-serif;
        fill: #607086;
      }

      .card {
        fill: #ffffff;
        stroke: #d8e6f5;
        stroke-width: 2;
        filter: url(#shadow);
      }

      .cardTitle {
        font: 700 22px Arial, sans-serif;
        fill: #0b2a4a;
      }

      .cardText {
        font: 400 15px Arial, sans-serif;
        fill: #596d84;
      }

      .tagText {
        font: 700 14px Arial, sans-serif;
        fill: #0d8a63;
      }

      .line {
        stroke: #2f6690;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }

      .softLine {
        stroke: #2f6690;
        stroke-width: 2.6;
        stroke-dasharray: 8 10;
        opacity: 0.7;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <text x="90" y="70" class="title">
    Bee OSINT Intelligence Platform
  </text>

  <text x="90" y="105" class="subtitle">
    High-level architecture for collection, classification, monitoring, and analysis.
  </text>

  <g transform="translate(120 165)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      Frontend App
    </text>

    <text x="32" y="78" class="cardText">
      React + Vite UI
    </text>

    <text x="32" y="102" class="cardText">
      Dashboards, news, graphs
    </text>

    <text x="32" y="128" class="tagText">
      Port 5173
    </text>
  </g>

  <g transform="translate(510 165)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      Backend API
    </text>

    <text x="32" y="78" class="cardText">
      FastAPI application
    </text>

    <text x="32" y="102" class="cardText">
      Auth, CRUD, workflows
    </text>

    <text x="32" y="128" class="tagText">
      Port 8000
    </text>
  </g>

  <g transform="translate(900 165)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      Data Layer
    </text>

    <text x="32" y="78" class="cardText">
      Database + migrations
    </text>

    <text x="32" y="102" class="cardText">
      News, users, records
    </text>

    <text x="32" y="128" class="tagText">
      SQLAlchemy
    </text>
  </g>

  <g transform="translate(120 420)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      OSINT Sources
    </text>

    <text x="32" y="78" class="cardText">
      RSS, websites, portals
    </text>

    <text x="32" y="102" class="cardText">
      Active / inactive sources
    </text>
  </g>

  <g transform="translate(510 420)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      Workers
    </text>

    <text x="32" y="78" class="cardText">
      Manual actions + schedules
    </text>

    <text x="32" y="102" class="cardText">
      Fetch, parse, normalize
    </text>
  </g>

  <g transform="translate(900 420)">
    <rect width="260"
          height="145"
          rx="18"
          class="card"/>

    <text x="32" y="48" class="cardTitle">
      Analytics
    </text>

    <text x="32" y="78" class="cardText">
      Sentiment, entities, trends
    </text>

    <text x="32" y="102" class="cardText">
      Relationship graphs
    </text>
  </g>

  <path d="M 380 237 H 510"
        class="line"/>

  <path d="M 770 237 H 900"
        class="line"/>

  <path d="M 250 420
           C 305 365 420 365 510 440"
        class="softLine"/>

  <path d="M 640 420
           C 650 365 700 340 750 310"
        class="line"/>

  <path d="M 770 492 H 900"
        class="line"/>

  <path d="M 770 285
           C 860 325 970 350 1030 420"
        class="softLine"/>

</svg>